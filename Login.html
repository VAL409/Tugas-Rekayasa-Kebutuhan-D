<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Sistem Pelacakan Alumni</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-blue-700 flex items-center justify-center h-screen font-sans">

<div class="relative bg-gray-50 p-8 pt-12 rounded-md shadow-2xl w-[350px] mt-12">
<div class="absolute -top-10 left-1/2 transform -translate-x-1/2 bg-blue-600 rounded-full w-20 h-20 flex items-center justify-center shadow-md">
<i class="fas fa-user text-white text-4xl"></i>
</div>

<h2 class="text-center text-xl font-semibold text-gray-700 mb-6">Login</h2>

<div class="space-y-4">
<div class="relative">
<input type="text" id="username" placeholder="Username" class="w-full bg-gray-200 text-gray-700 border-none px-4 py-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 pr-8">
<span class="absolute right-4 top-3 text-gray-500 font-bold">*</span>
</div>

<div class="relative">
<input type="password" id="password" placeholder="Password" class="w-full bg-gray-200 text-gray-700 border-none px-4 py-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 pr-8">
<span class="absolute right-4 top-3 text-gray-500 font-bold">*</span>
</div>

<button onclick="prosesLogin()" class="w-full bg-blue-600 text-white font-medium py-3 rounded mt-2 hover:bg-blue-700 transition duration-200 uppercase tracking-wide">
Login
</button>
</div>

<div class="mt-6 text-sm text-center text-blue-800 bg-blue-100 p-3 rounded border border-blue-200">
Keywoard<br>
Username: <span class="font-bold">admin</span><br>
Password: <span class="font-bold">admin123</span>
</div>

</div>

<script src="Login.js"></script>
</body>
</html>
